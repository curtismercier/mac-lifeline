<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 252" width="260" height="252" role="img" aria-label="mac-lifeline: an iMac with a happy face and a heartbeat line">
  <defs>
    <linearGradient id="alu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2e7ec"/>
      <stop offset="0.5" stop-color="#c2c9d0"/>
      <stop offset="1" stop-color="#a4acb4"/>
    </linearGradient>
    <linearGradient id="aluNeck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b9c0c7"/>
      <stop offset="1" stop-color="#949ca4"/>
    </linearGradient>
    <radialGradient id="screen" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#1b2734"/>
      <stop offset="1" stop-color="#0b0f15"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="130" cy="236" rx="60" ry="10" fill="#0b0f15" opacity="0.18" filter="url(#soft)"/>

  <!-- stand: foot + neck (behind body) -->
  <path d="M112 176 H148 L156 214 H104 Z" fill="url(#aluNeck)"/>
  <rect x="92" y="210" width="76" height="13" rx="6.5" fill="url(#alu)" stroke="#8b939b" stroke-width="1"/>

  <!-- iMac body -->
  <rect x="26" y="22" width="208" height="164" rx="17" fill="url(#alu)" stroke="#8b939b" stroke-width="1.5"/>
  <!-- black glass screen -->
  <rect x="37" y="33" width="186" height="120" rx="8" fill="url(#screen)"/>
  <!-- subtle screen reflection -->
  <path d="M37 60 L37 41 Q37 33 45 33 L120 33 Z" fill="#ffffff" opacity="0.05"/>
  <!-- chin: tiny camera-ish dot up top, plain chin below (no logo - keep it trademark-free) -->
  <circle cx="130" cy="29" r="1.6" fill="#7f8790"/>

  <!-- happy face (alive + healthy = mint green) -->
  <g fill="#4ade80">
    <circle cx="106" cy="72" r="8"/>
    <circle cx="154" cy="72" r="8"/>
    <!-- little cheek-light highlights -->
    <circle cx="103.5" cy="69.5" r="2.4" fill="#bbf7d0"/>
    <circle cx="151.5" cy="69.5" r="2.4" fill="#bbf7d0"/>
  </g>
  <path d="M104 92 Q130 116 156 92" fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>

  <!-- the lifeline: heartbeat pulse across the lower screen -->
  <path d="M46 135 H92 l6 -13 l8 26 l7 -34 l8 34 l6 -10 H214"
        fill="none" stroke="#fb7185" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
